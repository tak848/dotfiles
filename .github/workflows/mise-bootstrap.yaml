name: Update mise bootstrap

on:
  push:
    branches-ignore:
      - main
      - lazy-lock-update
    paths:
      - ".mise-bootstrap-version"
      - ".github/workflows/mise-bootstrap.yaml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Read version
        run: |
          source .mise-bootstrap-version
          # v プレフィックスを除去（mise generate bootstrap -V は v なしのバージョンを期待）
          echo "MISE_VERSION=${MISE_VERSION#v}" >> $GITHUB_ENV

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: ${{ env.MISE_VERSION }}
          install: false
          cache: true

      # .mise-bootstrap-version のバージョンで bootstrap を生成し、変更があれば API 経由で commit する
      - name: Regenerate and commit via GraphQL
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          FILES: dot_local/bin/executable_mise
          MESSAGE: "chore: update mise bootstrap to ${{ env.MISE_VERSION }}"
          REGENERATE_CMD: |
            mise generate bootstrap -V "$MISE_VERSION" -w ./dot_local/bin/executable_mise
        run: bash .github/scripts/commit-via-graphql.sh
