name: Update mise bootstrap

on:
  pull_request:
    paths:
      - ".mise-bootstrap-version"
      - ".github/workflows/mise-bootstrap.yaml"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-bootstrap:
    runs-on: ubuntu-latest
    if: github.actor == 'renovate[bot]' || github.actor == 'dependabot[bot]'
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}

      - name: Read version
        run: |
          source .mise-bootstrap-version
          # v プレフィックスを除去（mise generate bootstrap -V は v なしのバージョンを期待）
          echo "MISE_VERSION=${MISE_VERSION#v}" >> $GITHUB_ENV

      - name: Setup mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: ${{ env.MISE_VERSION }}
          install: false
          cache: true

      # .mise-bootstrap-version のバージョンで bootstrap を生成
      - name: Generate bootstrap script
        run: |
          mise generate bootstrap -V "$MISE_VERSION" -w ./dot_local/bin/executable_mise
          # shim symlink 経由で呼ばれた際に argv[0] を保持する（upstream 未対応）
          sed -i 's/^exec "$MISE_INSTALL_PATH" "$@"$/exec -a "$0" "$MISE_INSTALL_PATH" "$@"/' ./dot_local/bin/executable_mise
          grep -q '^exec -a "\$0" "\$MISE_INSTALL_PATH" "\$@"$' ./dot_local/bin/executable_mise || { echo "ERROR: sed replacement for exec -a failed"; exit 1; }

      - name: Check if bootstrap changed
        id: check-changes
        run: |
          if git diff --quiet dot_local/bin/executable_mise; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dot_local/bin/executable_mise
          git commit -m "chore: update mise bootstrap to ${{ env.MISE_VERSION }}"
          git pull --rebase
          git push
