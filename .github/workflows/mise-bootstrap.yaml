name: Update mise bootstrap

on:
  push:
    branches-ignore:
      - main
      - lazy-lock-update
    paths:
      - ".mise-bootstrap-version"
      - ".github/workflows/mise-bootstrap.yaml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Read version
        run: |
          source .mise-bootstrap-version
          # v プレフィックスを除去（mise generate bootstrap -V は v なしのバージョンを期待）
          echo "MISE_VERSION=${MISE_VERSION#v}" >> $GITHUB_ENV

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: ${{ env.MISE_VERSION }}
          install: false
          cache: true

      # .mise-bootstrap-version のバージョンで bootstrap を生成し、変更があれば API 経由で commit する
      - name: Regenerate and commit via GraphQL
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          FILES: dot_local/bin/executable_mise
          MESSAGE: "chore: update mise bootstrap to ${{ env.MISE_VERSION }}"
          REGENERATE_CMD: |
            mise generate bootstrap -V "$MISE_VERSION" -w ./dot_local/bin/executable_mise
        run: bash .github/scripts/commit-via-graphql.sh
