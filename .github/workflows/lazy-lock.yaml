name: Update lazy-lock.json

on:
  schedule:
    - cron: "0 0 * * 0" # 毎週日曜 0:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "dot_config/nvim/**"
      - ".chezmoidata/packages.yaml"
      - ".github/workflows/lazy-lock.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 週次更新: PR を作成
  update-scheduled:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install chezmoi
        run: |
          mkdir -p "$HOME/.local/bin"
          if ! command -v chezmoi &> /dev/null; then
            sh -c "$(curl -fsLS chezmoi.io/get)" -- -b "$HOME/.local/bin"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup nvim config
        run: |
          chezmoi apply \
            --source "$GITHUB_WORKSPACE" \
            --exclude=scripts \
            --force \
            --interactive=false

      - name: Sync plugins and generate lockfile
        run: |
          # 1回目: LazyVim 本体をインストール
          nvim --headless "+Lazy! sync" +qa
          # 2回目: LazyVim の依存プラグインをインストール
          nvim --headless "+Lazy! sync" +qa
          cp ~/.config/nvim/lazy-lock.json dot_config/nvim/

      - name: Create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(nvim): update lazy-lock.json"
          title: "chore(nvim): update lazy-lock.json"
          branch: lazy-lock-update
          add-paths: dot_config/nvim/lazy-lock.json
          labels: dependencies

  # PR 時: lockfile を PR に直接コミット
  update-on-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install chezmoi
        run: |
          mkdir -p "$HOME/.local/bin"
          if ! command -v chezmoi &> /dev/null; then
            sh -c "$(curl -fsLS chezmoi.io/get)" -- -b "$HOME/.local/bin"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync plugins and commit lockfile via GraphQL
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
          FILES: dot_config/nvim/lazy-lock.json
          MESSAGE: "chore(nvim): update lazy-lock.json"
          REGENERATE_CMD: |
            chezmoi apply --source "$GITHUB_WORKSPACE" --exclude=scripts --force --interactive=false
            # 1回目: LazyVim 本体をインストール
            nvim --headless "+Lazy! sync" +qa
            # 2回目: LazyVim の依存プラグインをインストール
            nvim --headless "+Lazy! sync" +qa
            cp ~/.config/nvim/lazy-lock.json dot_config/nvim/
        run: bash .github/scripts/commit-via-graphql.sh
