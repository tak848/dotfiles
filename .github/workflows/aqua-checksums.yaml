name: Update aqua checksums

on:
  pull_request:
    paths:
      - "dot_config/aquaproj-aqua/aqua.yaml"
      - ".github/workflows/aqua-checksums.yaml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-${{ github.head_ref }}
  cancel-in-progress: false

jobs:
  update-checksums:
    runs-on: ubuntu-latest
    if: github.event.sender.login != 'github-actions[bot]'
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}

      - name: Install aqua
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.57.1

      - name: Update checksums
        run: |
          cd dot_config/aquaproj-aqua
          aqua update-checksum --prune

      - name: Check if aqua-checksums.json changed
        id: check-changes
        run: |
          if git diff --quiet dot_config/aquaproj-aqua/aqua-checksums.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dot_config/aquaproj-aqua/aqua-checksums.json
          git commit -m "chore: update aqua checksums"
          git pull --rebase
          git push
