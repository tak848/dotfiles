name: Update mise lockfiles and aqua checksums

on:
  push:
    branches-ignore:
      - main
      - lazy-lock-update
    paths:
      - ".mise.toml"
      - "dot_config/mise/config.toml"
      - "dot_config/aquaproj-aqua/aqua.yaml"
      - ".github/workflows/lockfiles-and-checksums.yaml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-lockfiles-and-checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}

      # mise は aqua-registry のスナップショットをバイナリに焼き込んでいるため、
      # lock 生成と CI で mise のバージョンが異なると、lock に書かれる asset と
      # CI 側 mise が期待する asset（展開形式）が食い違い CI が壊れる。
      # ci.yaml と同じく .mise-bootstrap-version に pin して常に一致させる
      - name: Read mise version from .mise-bootstrap-version
        run: |
          source .mise-bootstrap-version
          echo "MISE_VERSION=$MISE_VERSION" >> $GITHUB_ENV

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: ${{ env.MISE_VERSION }}
          install: false
          cache: true

      - name: Install aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.62.1

      - name: Regenerate and commit via GraphQL
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          FILES: mise.lock dot_config/mise/mise.lock dot_config/aquaproj-aqua/aqua-checksums.json
          MESSAGE: "chore: update mise lockfiles and aqua checksums"
          REGENERATE_CMD: |
            rm -f mise.lock && mise lock
            ( cd dot_config/mise && rm -f mise.lock && mise lock )
            ( cd dot_config/aquaproj-aqua && aqua update-checksum --prune )
        run: bash .github/scripts/commit-via-graphql.sh
