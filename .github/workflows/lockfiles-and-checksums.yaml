name: Update mise lockfiles and aqua checksums

on:
  push:
    branches-ignore:
      - main
      - lazy-lock-update
    paths:
      - ".mise.toml"
      - "dot_config/mise/config.toml"
      - "dot_config/aquaproj-aqua/aqua.yaml"
      - ".github/workflows/lockfiles-and-checksums.yaml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-lockfiles-and-checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: false
          cache: true

      - name: Install aqua
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.60.0

      - name: Regenerate and commit via GraphQL
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          FILES: mise.lock dot_config/mise/mise.lock dot_config/aquaproj-aqua/aqua-checksums.json
          MESSAGE: "chore: update mise lockfiles and aqua checksums"
          REGENERATE_CMD: |
            rm -f mise.lock && mise lock
            ( cd dot_config/mise && rm -f mise.lock && mise lock )
            ( cd dot_config/aquaproj-aqua && aqua update-checksum --prune )
        run: bash .github/scripts/commit-via-graphql.sh
