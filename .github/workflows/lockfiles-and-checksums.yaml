name: Update mise lockfiles and aqua checksums

on:
  push:
    branches-ignore:
      - main
      - lazy-lock-update
    paths:
      - ".mise.toml"
      - "dot_config/mise/config.toml"
      - "dot_config/aquaproj-aqua/aqua.yaml"
      - ".github/workflows/lockfiles-and-checksums.yaml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-lockfiles-and-checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: false
          cache: true

      - name: Install aqua
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.57.1

      - name: Update root mise.lock
        run: rm -f mise.lock && mise lock

      - name: Update dot_config mise.lock
        run: |
          cd dot_config/mise
          rm -f mise.lock && mise lock

      - name: Update aqua checksums
        run: |
          cd dot_config/aquaproj-aqua
          aqua update-checksum --prune

      - name: Check if generated files changed
        id: check-changes
        run: |
          CHECK_FILES=(mise.lock dot_config/mise/mise.lock dot_config/aquaproj-aqua/aqua-checksums.json)
          if git diff --quiet -- "${CHECK_FILES[@]}"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mise.lock dot_config/mise/mise.lock dot_config/aquaproj-aqua/aqua-checksums.json
          git commit -m "chore: update mise lockfiles and aqua checksums"
          git pull --rebase
          git push
