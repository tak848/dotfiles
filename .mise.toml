[settings]
idiomatic_version_file_enable_tools = ["node"]
auto_install = false
experimental = true
lockfile = true
locked = false                                 # npm backend が checksum 未対応のため

[env]
# aube (mise の npm backend が内部で使う) の trustPolicy=no-downgrade が
# tinyexec@1.2.2 を拒否するため、このバージョンだけ exclude。
# 詳細は dot_config/mise/config.toml の [env] コメント参照。
NPM_CONFIG_TRUST_POLICY_EXCLUDE = "tinyexec@1.2.2"

[tools]
# このリポジトリで使うランタイム
node = "24.16.0"
pnpm = "11.6.0"

# aqua CLI（dot_config/aquaproj-aqua の管理用）
"github:aquaproj/aqua" = "v2.60.0"

# このリポジトリで使う CLI ツール
"aqua:google/go-jsonnet" = "0.22.0"
"aqua:go-task/task" = "3.51.1"

# install.sh からの bootstrap で使う。dot_config/mise/config.toml と揃える
"aqua:twpayne/chezmoi" = "2.70.5"

# lazy-lock.yaml ワークフローで使用
"aqua:neovim/neovim" = "0.12.3"

# npm パッケージ
"npm:cc-sdd" = "3.0.2"
