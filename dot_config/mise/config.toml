[settings]
idiomatic_version_file_enable_tools = ["node"]
auto_install = false
experimental = true
lockfile = true
# npm backend が checksum/URL をサポートしていないため locked は無効化
# checksum があるツール（aqua: 等）は lockfile=true で検証される
locked = false

[settings.aqua]
# mise v2026.3.6 の native cosign verification が CI 上で Rekor key parse に失敗するため、
# dotfiles 用の aqua backend では checksum verification のみに寄せる
cosign = false

[env]
# aube (mise の npm backend が内部で使う) の trustPolicy=no-downgrade が
# tinyexec@1.2.2 を ERR_AUBE_TRUST_DOWNGRADE で拒否するため、
# このバージョンだけ exclude する。
# - tinyexec@1.0.2 は GitHub Actions OIDC の trusted publisher で publish
# - tinyexec@1.2.2 (現 latest) はメンテナ個人 publish で provenance attestation のみ
# バージョンピンでの除外なので、1.2.3+ や他パッケージでは no-downgrade ガードが残る。
# 参考: https://github.com/tak848/dotfiles/actions/runs/26555130050
NPM_CONFIG_TRUST_POLICY_EXCLUDE = "tinyexec@1.2.2"

[tools]
# ============================================
# ランタイム（core backend）
# ============================================
node = "24.16.0"
pnpm = "11.5.2"
"github:endevco/aube" = "v1.18.0" # 高速な Node.js パッケージマネージャ
go = "1.26.4"

# ============================================
# aqua CLI（github backend）
# ============================================
# mise の aqua backend で問題のあるツール（aws-cli, 1password/cli, gopls）は
# aqua CLI で直接管理する
"github:aquaproj/aqua" = "v2.59.1"

# ============================================
# CLI ツール（aqua backend）
# ============================================
# GitHub CLI
"aqua:cli/cli" = "2.93.0"

# シェル関連
"aqua:junegunn/fzf" = "0.73.1"
"aqua:starship/starship" = "1.25.1"
"aqua:direnv/direnv" = "2.37.1"
# zoxide は aqua CLI で管理（mise lock で checksum 取得不可）

# 検索・ファイル操作
"aqua:twpayne/chezmoi" = "2.70.5"
"aqua:BurntSushi/ripgrep" = "15.1.0"
"aqua:phiresky/ripgrep-all" = "0.10.10"
# rga依存: ドキュメント変換（docx, epub, odt等）
"github:jgm/pandoc" = "3.10"
"aqua:jqlang/jq" = "1.8.1"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:x-motemen/ghq" = "1.10.1"
"aqua:jesseduffield/lazygit" = "0.62.2"
"aqua:jesseduffield/lazydocker" = "0.25.2"

# エディタ・ターミナル
"aqua:neovim/neovim" = "0.12.2"
"github:tmux/tmux-builds" = "v3.6a"
"aqua:arl/gitmux" = "0.11.5"

# Python ツール
"aqua:astral-sh/uv" = "0.11.19"

# クラウド・インフラ（aws-cli は aqua CLI で管理）
"aqua:kubernetes/kubectl" = "1.35.0"
"aqua:cloudflare/cloudflared" = "2026.5.2"

# 開発ツール
"aqua:bufbuild/buf" = "1.70.0"
"aqua:go-task/task" = "3.51.1"
"aqua:golangci/golangci-lint" = "2.12.2"
"aqua:theseus-rs/postgresql-binaries" = "18.4.0"

# Jsonnet
"aqua:google/go-jsonnet" = "0.22.0"
"aqua:grafana/jsonnet-language-server" = "0.17.0"

# Claude Code permission gate
"aqua:tak848/ccgate" = "0.9.3"

# Claude Code セッション選択（claude --resume の fzf フロントエンド）
"github:sorafujitani/ccsession" = "v0.2.0"

# Anthropic API CLI
"aqua:anthropics/anthropic-cli" = "1.10.0"

# Language Server
"go:golang.org/x/tools/gopls" = "0.22.0"
"aqua:rust-lang/rust-analyzer" = "2025-12-01"
"aqua:tamasfe/taplo" = "0.10.0"

# その他（1password/cli は aqua CLI で管理）
"aqua:temporalio/cli" = "1.7.1"
"aqua:jdx/usage" = "3.4.0"

# ============================================
# npm グローバルパッケージ
# ============================================
"aqua:anthropics/claude-code" = "2.1.170"
"github:google-antigravity/antigravity-cli" = "1.0.6"     # agy: Gemini CLI の後継
"aqua:openai/codex" = "0.138.0"
"npm:ccusage" = "20.0.6"
"npm:@typescript/native-preview" = "7.0.0-dev.20260606.1"
"npm:cc-sdd" = "3.0.2"
"npm:difit" = "5.0.2"
"npm:@fission-ai/openspec" = "1.4.1"
"npm:freee-mcp" = "0.29.0"
