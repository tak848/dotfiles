[settings]
idiomatic_version_file_enable_tools = ["node"]
auto_install = false
experimental = true
lockfile = true
# npm backend が checksum/URL をサポートしていないため locked は無効化
# checksum があるツール（aqua: 等）は lockfile=true で検証される
locked = false

[settings.aqua]
# mise v2026.3.6 の native cosign verification が CI 上で Rekor key parse に失敗するため、
# dotfiles 用の aqua backend では checksum verification のみに寄せる
cosign = false

[tools]
# ============================================
# ランタイム（core backend）
# ============================================
node = "24.14.1"
pnpm = "10.33.0"
go = "1.26.1"

# ============================================
# aqua CLI（github backend）
# ============================================
# mise の aqua backend で問題のあるツール（aws-cli, 1password/cli, gopls）は
# aqua CLI で直接管理する
"github:aquaproj/aqua" = "2.57.1"

# ============================================
# CLI ツール（aqua backend）
# ============================================
# GitHub CLI
"aqua:cli/cli" = "2.89.0"

# シェル関連
"aqua:junegunn/fzf" = "0.70.0"
"aqua:starship/starship" = "1.24.2"
"aqua:direnv/direnv" = "2.37.1"
# zoxide は aqua CLI で管理（mise lock で checksum 取得不可）

# 検索・ファイル操作
"aqua:twpayne/chezmoi" = "2.70.0"
"aqua:BurntSushi/ripgrep" = "15.1.0"
"aqua:phiresky/ripgrep-all" = "0.10.10"
# rga依存: ドキュメント変換（docx, epub, odt等）
"github:jgm/pandoc" = "3.9"
"aqua:jqlang/jq" = "1.8.1"
"aqua:mikefarah/yq" = "4.52.5"
"aqua:x-motemen/ghq" = "1.9.4"
"aqua:jesseduffield/lazygit" = "0.60.0"
"aqua:jesseduffield/lazydocker" = "0.25.0"

# エディタ・ターミナル
"aqua:neovim/neovim" = "0.12.0"
"github:tmux/tmux-builds" = "v3.6a"
"aqua:arl/gitmux" = "0.11.5"

# Python ツール
"aqua:astral-sh/uv" = "0.11.2"

# クラウド・インフラ（aws-cli は aqua CLI で管理）
"aqua:kubernetes/kubectl" = "1.35.0"
"aqua:cloudflare/cloudflared" = "2026.3.0"

# 開発ツール
"aqua:bufbuild/buf" = "1.66.1"
"aqua:go-task/task" = "3.49.1"
"aqua:golangci/golangci-lint" = "2.11.4"

# Jsonnet
"aqua:google/go-jsonnet" = "0.22.0"
"aqua:grafana/jsonnet-language-server" = "0.17.0"

# Claude Code permission gate
"go:github.com/tak848/ccgate" = "0.2.6"

# Language Server
"go:golang.org/x/tools/gopls" = "0.21.1"
"aqua:rust-lang/rust-analyzer" = "2025-12-01"
"aqua:tamasfe/taplo" = "0.10.0"

# その他（1password/cli は aqua CLI で管理）
"aqua:temporalio/cli" = "1.6.2"
"aqua:jdx/usage" = "3.2.0"

# ============================================
# npm グローバルパッケージ
# ============================================
"aqua:anthropics/claude-code" = "2.1.89"
"npm:@google/gemini-cli" = "0.35.3"
"aqua:openai/codex" = "0.118.0"
"npm:ccusage" = "18.0.10"
"npm:@ccusage/codex" = "18.0.10"
"npm:@typescript/native-preview" = "7.0.0-dev.20260331.1"
"npm:cc-sdd" = "2.1.1"
"npm:difit" = "4.0.1"
"npm:freee-mcp" = "0.17.1"
