{{- /* chezmoi:modify-template */ -}}
#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.6-sol"
model_context_window = 1000000
model_auto_compact_token_limit = 500000
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
approval_policy = "untrusted"
personality = "pragmatic"
web_search = "live"
suppress_unstable_features_warning = true
notify = ["{{ .chezmoi.homeDir }}/.codex/bin/notification"]
developer_instructions = """\
文脈を読め。指示の字面ではなく意図を汲め。ユーザーが求める粒度・スコープに合わせろ。\n\
まず広く調べて地図を作れ。局所解に飛びつくな。\n\
非自明な作業では、実装前に関連コード・設定・呼び出し元・CI・依存・スキーマ/API・既存ルールを横断調査し、調査済み根拠・未確認事項・判断が割れる点・影響範囲・検証条件・スコープ外を plan に明記しろ。\n\
調査不足や判断不足のまま plan を確定するな。分からないことを埋めず、必要なら具体的な判断点としてユーザーに聞け。\n\
設定・呼び出し元・CI・依存・影響範囲を横断で確認しろ。レビューでやる横断確認を、調査・plan・実装でもやれ。\n\
1点直して終わるな。その変更がどこに波及するか見ろ。\n\
設定変更・バージョン更新では、その値がどこで使われているかを先に全て洗い出せ。\n\
plan はリスクと不確実性を十分に潰した上で、実行可能な作業計画として出せ。\n\
コードコメントは単体で意味が通る局所説明のみ。PR 説明や調査メモをコードコメントに混ぜるな。\n\
PR・issue・doc への参照は、その場で飛べるリンクを必ず貼れ。\n\
推測を断定するな。未確認なら「未確認」と明記しろ。\n\
`git -c commit.gpgsign=false` は禁止。署名が必要な commit で失敗したら、1Password のロック解除や pinentry の状態を確認し、必要ならユーザーに確認しろ。"""

[tui]
# Claude Code の statusline で見ている運用情報に寄せて、Codex の組み込み項目を広めに表示する。
status_line = [
  "model-with-reasoning",
  # "fast-mode",
  # "git-branch",
  # "context-remaining",
  "context-used",
  "used-tokens",
  "context-window-size",
  "total-input-tokens",
  "total-output-tokens",
  "five-hour-limit",
  "weekly-limit",
  "session-id",
  "codex-version",
  "project-root",
  "current-dir",
]

[features]
hooks = true
unified_exec = true
shell_snapshot = true
prevent_idle_sleep = true
multi_agent_v2 = true

[sandbox_workspace_write]
network_access = true
writable_roots = [
  "{{ .chezmoi.homeDir }}/.local/share/aquaproj-aqua",
  "{{ .chezmoi.homeDir }}/go/pkg/mod",
  "{{ .chezmoi.homeDir }}/go/pkg/sumdb",
{{- if eq .chezmoi.os "darwin" }}
  "{{ .chezmoi.homeDir }}/Library/Caches",
{{- end }}
]

# MCP tool の自動承認は、Claude (dot_claude/settings.jsonnet permissions.allow) が
# allow している tool 名だけを per-tool approve で揃える。server 全体の
# default_tools_approval_mode = "approve" は使わない（Claude 未承認 tool まで緩めないため）。
# approval_mode は approve のみ global approval_policy に関係なく自動承認される。
[mcp_servers.context7]
url = "https://mcp.context7.com/mcp/oauth"
tools.resolve-library-id.approval_mode = "approve"
tools.query-docs.approval_mode = "approve"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GH_TOKEN"
tools.get_me.approval_mode = "approve"
tools.list_issues.approval_mode = "approve"
tools.search_issues.approval_mode = "approve"
tools.issue_read.approval_mode = "approve"
tools.list_pull_requests.approval_mode = "approve"
tools.search_pull_requests.approval_mode = "approve"
tools.pull_request_read.approval_mode = "approve"
tools.get_file_contents.approval_mode = "approve"
tools.list_commits.approval_mode = "approve"
tools.get_commit.approval_mode = "approve"
tools.list_branches.approval_mode = "approve"
tools.list_releases.approval_mode = "approve"
tools.list_tags.approval_mode = "approve"
tools.search_code.approval_mode = "approve"
tools.get_repository_tree.approval_mode = "approve"
tools.list_notifications.approval_mode = "approve"
tools.get_notification_details.approval_mode = "approve"
# write 系は Claude が自動許可しているコメント/Issue のみ（PR 作成・更新は都度確認）
tools.add_issue_comment.approval_mode = "approve"
tools.issue_write.approval_mode = "approve"
tools.add_reply_to_pull_request_comment.approval_mode = "approve"

[mcp_servers.devin]
url = "https://mcp.devin.ai/mcp"
bearer_token_env_var = "DEVIN_API_KEY"
tools.ask_question.approval_mode = "approve"
tools.read_wiki_contents.approval_mode = "approve"
tools.read_wiki_structure.approval_mode = "approve"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.aws-knowledge]
url = "https://knowledge-mcp.global.api.aws"
tools.aws___search_documentation.approval_mode = "approve"
tools.aws___read_documentation.approval_mode = "approve"
tools.aws___recommend.approval_mode = "approve"
tools.aws___list_regions.approval_mode = "approve"
tools.aws___get_regional_availability.approval_mode = "approve"
tools.aws___retrieve_agent_sop.approval_mode = "approve"

[profiles.fast]
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"

[profiles.xhigh]
model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"

[profiles.codex]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"

[profiles.codex-fast]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

[profiles.codex-xhigh]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
{{- if ne .chezmoi.stdin "" }}
{{-   $existing := fromToml .chezmoi.stdin }}
{{-   if hasKey $existing "projects" }}

{{ dict "projects" (index $existing "projects") | toToml -}}
{{-   end }}
{{-   if hasKey $existing "notice" }}

{{ dict "notice" (index $existing "notice") | toToml -}}
{{-   end }}
{{-   if hasKey $existing "tui" }}
{{-     $tui := index $existing "tui" }}
{{-     if hasKey $tui "model_availability_nux" }}
{{-       $modelAvailabilityNux := index $tui "model_availability_nux" }}

[tui.model_availability_nux]
{{-       range $model, $value := $modelAvailabilityNux }}
{{ printf "%q = %v" $model $value }}
{{-       end }}
{{-     end }}
{{-   end }}
{{-   if hasKey $existing "hooks" }}
{{-     $hooks := index $existing "hooks" }}
{{-     if hasKey $hooks "state" }}

{{ dict "hooks" (dict "state" (index $hooks "state")) | toToml -}}
{{-     end }}
{{-   end }}
{{- end }}
