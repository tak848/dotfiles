{{- /* chezmoi:modify-template */ -}}
#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_context_window = 1000000
model_auto_compact_token_limit = 500000
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
personality = "pragmatic"
web_search = "live"

[tui]
# Claude Code の statusline で見ている運用情報に寄せて、Codex の組み込み項目を広めに表示する。
status_line = [
  "model-with-reasoning",
  # "fast-mode",
  # "git-branch",
  # "context-remaining",
  "context-used",
  "used-tokens",
  "context-window-size",
  "total-input-tokens",
  "total-output-tokens",
  "five-hour-limit",
  "weekly-limit",
  "session-id",
  "codex-version",
  "project-root",
  "current-dir",
]

[features]
unified_exec = true
shell_snapshot = true
prevent_idle_sleep = true

[sandbox_workspace_write]
network_access = true
writable_roots = [
  "{{ .chezmoi.homeDir }}/.local/share/aquaproj-aqua",
{{- if eq .chezmoi.os "darwin" }}
  "{{ .chezmoi.homeDir }}/Library/Caches",
{{- end }}
]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp/oauth"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GH_TOKEN"

[mcp_servers.devin]
url = "https://mcp.devin.ai/mcp"
bearer_token_env_var = "DEVIN_API_KEY"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[profiles.fast]
model = "gpt-5.2"
model_reasoning_effort = "medium"

[profiles.xhigh]
model = "gpt-5.2"
model_reasoning_effort = "xhigh"

[profiles.codex]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"

[profiles.codex-fast]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

[profiles.codex-xhigh]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
{{- if ne .chezmoi.stdin "" }}
{{-   $existing := fromToml .chezmoi.stdin }}
{{-   if hasKey $existing "projects" }}

{{ dict "projects" (index $existing "projects") | toToml -}}
{{-   end }}
{{-   if hasKey $existing "notice" }}

{{ dict "notice" (index $existing "notice") | toToml -}}
{{-   end }}
{{- end }}
