{{- /* chezmoi:modify-template */ -}}
#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_context_window = 1000000
model_auto_compact_token_limit = 500000
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
personality = "pragmatic"
web_search = "live"
notify = ["{{ .chezmoi.homeDir }}/.codex/bin/notification"]
developer_instructions = """\
文脈を読め。指示の字面ではなく意図を汲め。ユーザーが求める粒度・スコープに合わせろ。\n\
まず広く調べて地図を作れ。局所解に飛びつくな。\n\
設定・呼び出し元・CI・依存・影響範囲を横断で確認しろ。レビューでやる横断確認を、調査・plan・実装でもやれ。\n\
1点直して終わるな。その変更がどこに波及するか見ろ。\n\
設定変更・バージョン更新では、その値がどこで使われているかを先に全て洗い出せ。\n\
plan はリスクと不確実性を十分に潰した上で、実行可能な作業計画として出せ。\n\
コードコメントは単体で意味が通る局所説明のみ。PR 説明や調査メモをコードコメントに混ぜるな。\n\
PR・issue・doc への参照は、その場で飛べるリンクを必ず貼れ。\n\
推測を断定するな。未確認なら「未確認」と明記しろ。"""

[tui]
# Claude Code の statusline で見ている運用情報に寄せて、Codex の組み込み項目を広めに表示する。
status_line = [
  "model-with-reasoning",
  # "fast-mode",
  # "git-branch",
  # "context-remaining",
  "context-used",
  "used-tokens",
  "context-window-size",
  "total-input-tokens",
  "total-output-tokens",
  "five-hour-limit",
  "weekly-limit",
  "session-id",
  "codex-version",
  "project-root",
  "current-dir",
]

[features]
unified_exec = true
shell_snapshot = true
prevent_idle_sleep = true

[sandbox_workspace_write]
network_access = true
writable_roots = [
  "{{ .chezmoi.homeDir }}/.local/share/aquaproj-aqua",
{{- if eq .chezmoi.os "darwin" }}
  "{{ .chezmoi.homeDir }}/Library/Caches",
{{- end }}
]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp/oauth"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GH_TOKEN"

[mcp_servers.devin]
url = "https://mcp.devin.ai/mcp"
bearer_token_env_var = "DEVIN_API_KEY"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.aws-knowledge]
url = "https://knowledge-mcp.global.api.aws"

[profiles.fast]
model = "gpt-5.2"
model_reasoning_effort = "medium"

[profiles.xhigh]
model = "gpt-5.2"
model_reasoning_effort = "xhigh"

[profiles.codex]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"

[profiles.codex-fast]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

[profiles.codex-xhigh]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
{{- if ne .chezmoi.stdin "" }}
{{-   $existing := fromToml .chezmoi.stdin }}
{{-   if hasKey $existing "projects" }}

{{ dict "projects" (index $existing "projects") | toToml -}}
{{-   end }}
{{-   if hasKey $existing "notice" }}

{{ dict "notice" (index $existing "notice") | toToml -}}
{{-   end }}
{{- end }}
